<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎰 瑪麗隔壁刮刮樂</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #ff6600; margin-bottom: 10px; }
        
        /* 按鈕區塊 */
        .upload-area { border: 2px dashed #ddd; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .btn { padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; display: block; width: 100%; margin: 10px 0; font-size: 16px; }
        .btn-select { background: #3498db; color: white; }
        .btn-confirm { background: #27ae60; color: white; display: none; } /* 預設隱藏 */
        
        /* 刮刮樂網格 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; margin-top: 20px; }
        .card { width: 60px; height: 60px; background: #eee; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-weight: bold; color: #aaa; cursor: not-allowed; transition: 0.2s; }
        
        /* 解鎖後的樣式 */
        .card.ready { background: #ff9f43; color: white; cursor: pointer; }
        .card.open { background: #f1c40f !important; color: #333 !important; }
        .card.win { background: #e74c3c !important; color: white !important; }
        
        #status { margin-top: 10px; font-weight: bold; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎰 瑪麗隔壁刮刮樂</h1>
    
    <div class="upload-area">
        <p>📸 請先拍下夾到的戰利品</p>
        
        <label for="file-input" class="btn btn-select" id="select-label">1. 選擇/拍攝照片</label>
        <input type="file" id="file-input" accept="image/*" style="display:none;">
        
        <button id="confirm-btn" class="btn btn-confirm">2. 確定上傳並解鎖</button>
        
        <div id="status">目前狀態：尚未選取</div>
    </div>

    <div id="grid" class="grid"></div>
</div>

<script>
    // --- 設定區 ---
    const LINE_ID = "imbored0425"; // 記得改這行！
    let prizes = ["大獎 🏆", "二獎 🎁", "三獎 🧧", ...Array(77).fill("未中獎")];
    prizes.sort(() => Math.random() - 0.5);
    // --------------

    const fileInput = document.getElementById('file-input');
    const confirmBtn = document.getElementById('confirm-btn');
    const statusText = document.getElementById('status');
    const selectLabel = document.getElementById('select-label');
    const grid = document.getElementById('grid');
    
    let isUnlocked = false;
    let hasPlayed = false;

    // 初始化格子
    for (let i = 0; i < 80; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerText = i + 1;
        card.onclick = () => {
            if (!isUnlocked) return alert("請先完成上傳步驟！");
            if (hasPlayed) return;
            hasPlayed = true;
            
            card.innerText = prizes[i];
            card.classList.add('open');
            if (prizes[i].includes("獎")) {
                card.classList.add('win');
                setTimeout(() => {
                    const msg = encodeURIComponent("你好！我刮中了：" + prizes[i]);
                    if(confirm("恭喜中獎！是否前往 LINE 領獎？")) {
                        window.location.href = "https://line.me/R/oaMessage/"imbored0425"/?" + msg;
                    }
                }, 500);
            } else {
                alert("可惜沒中獎，下次加油！");
            }
        };
        grid.appendChild(card);
    }

    // 當選好檔案時
    fileInput.onchange = (e) => {
        if (e.target.files.length > 0) {
            statusText.innerText = "已選取：" + e.target.files[0].name;
            confirmBtn.style.display = "block"; // 顯示確認按鈕
            selectLabel.innerText = "重新選擇";
        }
    };

    // 當按下確認按鈕時
    confirmBtn.onclick = () => {
        statusText.innerText = "✅ 上傳成功！請開刮";
        statusText.style.color = "#27ae60";
        isUnlocked = true;
        
        // 隱藏所有按鈕，讓介面乾淨
        selectLabel.style.display = "none";
        confirmBtn.style.display = "none";
        
        // 啟動格子
        document.querySelectorAll('.card').forEach(c => c.classList.add('ready'));
    };
</script>

</body>
</html>
