<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>瑪麗隔壁刮刮樂</title>

<style>

body{
font-family:Arial;
text-align:center;
}

/* 重點在這裡 */
#grid{
display:grid;
grid-template-columns:repeat(8,60px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.card{
width:60px;
height:60px;
background:#ccc;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
}

.open{
background:gold;
}

</style>
</head>

<body>

<h1>🎰 瑪麗隔壁刮刮樂</h1>
<p>每人只能刮一次</p>

<!-- 這行很重要 -->
<div id="grid"></div>

<script>

let played=false

let prizes=[
"大獎","二獎","三獎",
...Array(77).fill("未中")
]

prizes.sort(()=>Math.random()-0.5)

let grid=document.getElementById("grid")

for(let i=0;i<80;i++){

let div=document.createElement("div")
div.className="card"
div.innerText=i+1

div.onclick=()=>{

if(played){
alert("你已經刮過了")
return
}

div.classList.add("open")
div.innerText=prizes[i]
played=true

}

grid.appendChild(div)

}

</script>

</body>
</html>
